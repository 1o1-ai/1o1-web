<section id="vram">
  <h2>VRAM Scaling Model: 10-25 Sessions</h2>
  <p>With H100 SXM5 (80GB HBM3 per GPU) and NVLink 4.0, VRAM is pooled across GPUs using tensor parallelism. The 7B model is sharded across all H100s, dramatically increasing effective capacity per session.</p>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Config</th><th>GPUs</th><th>Total VRAM</th><th>Model Weights</th><th>Available for Sessions</th><th>Max Sessions</th></tr></thead>
    <tbody>
      <tr><td>Phase 1</td><td>2x H100</td><td>160 GB</td><td>7 GB (sharded)</td><td>~148 GB</td><td><strong>10-12</strong></td></tr>
      <tr><td>Phase 2</td><td>3x H100</td><td>240 GB</td><td>7 GB (sharded)</td><td>~228 GB</td><td><strong>16-18</strong></td></tr>
      <tr style="background:rgba(139,92,246,.06)"><td>Phase 3</td><td>4x H100</td><td>320 GB</td><td>7 GB (sharded)</td><td>~308 GB</td><td><strong>22-25</strong></td></tr>
    </tbody>
  </table></div>
  <div class="alert alert-g"><span class="alert-icon">OK</span><div><strong>NVLink advantage:</strong> KV cache tensors for all sessions live in the pooled 320GB VRAM space. NVLink 4.0's 900 GB/s bidirectional bandwidth means cross-GPU KV reads add only ~2ms latency -- vs ~80ms penalty on PCIe-connected multi-GPU setups.</div></div>
</section>

<section id="nvlink">
  <h2>NVLink + RDMA Explained</h2>
  <h3>NVLink 4.0 -- Why It Replaces PCIe for This Workload</h3>
  <p>In multi-GPU inference, GPUs must frequently exchange <strong>KV cache tensors</strong> between GPUs when a session's context spans multiple GPU partitions. Over PCIe Gen5, this adds 40-80ms latency per transfer. NVLink 4.0 reduces this to &lt;2ms via direct GPU-to-GPU memory access at 900 GB/s.</p>
  <div class="code-block">PCIe path (SLOW):  GPU0 -&gt; CPU -&gt; PCIe switch -&gt; CPU -&gt; GPU1  (~40-80ms)
NVLink path (FAST): GPU0 ----------------------------------------- GPU1  (~1-2ms)

# NVLink topology in a 4-GPU DGX H100 node:
       GPU0 &lt;-- 900 GB/s --&gt; GPU1
         ^                      ^
         v                      v
       GPU2 &lt;-- 900 GB/s --&gt; GPU3
         \____________________/
              NVSwitch fabric
         (any-to-any, full 900 GB/s)</div>

  <h3>RDMA (RoCEv2) -- Cross-Node Communication</h3>
  <p>When scaling beyond a single DGX node, RDMA over Converged Ethernet v2 provides GPU-to-GPU direct memory access across the network fabric without CPU involvement.</p>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Technology</th><th>Bandwidth</th><th>Latency</th><th>Use Case</th></tr></thead>
    <tbody>
      <tr><td>PCIe Gen5 x16</td><td>64 GB/s unidirectional</td><td>~40-80ms cross-GPU</td><td>Host-to-GPU weight loading</td></tr>
      <tr><td>NVLink 4.0</td><td>900 GB/s bidirectional</td><td>~1-2ms</td><td>Intra-node KV cache sharing</td></tr>
      <tr><td>RDMA RoCEv2 (400GbE)</td><td>50 GB/s</td><td>~5-10ms</td><td>Inter-node tensor parallelism (Phase 4+)</td></tr>
      <tr><td>InfiniBand HDR</td><td>50 GB/s</td><td>~1-2ms</td><td>Alternative to RoCEv2; higher cost</td></tr>
    </tbody>
  </table></div>
</section>

<section id="network">
  <h2>Spine-Leaf Network Architecture</h2>
  <p>Spine-leaf topology provides <strong>predictable, non-blocking bandwidth</strong> between all compute nodes.</p>
  <div class="code-block">+---------------------------------------------------------------+
|                    INTERNET / WAN                             |
+------------------------------+--------------------------------+
                               | 10GbE uplink
+------------------------------v--------------------------------+
|              BORDER / EDGE LAYER                              |
|  Firewalls (HA pair) + DDoS scrubbing + TLS offload          |
|  nginx cluster (WebSocket proxy, SSL termination)            |
+--------------+----------------------+-------------------------+
               | 25GbE                | 25GbE
+--------------v----------------------v-------------------------+
|                    SPINE LAYER                                |
|  Spine-1 (Arista 7060X)   Spine-2 (Arista 7060X)            |
|  100GbE non-blocking       100GbE non-blocking (redundant)   |
+------+------------+------------+------------+----------------+
       |            |            |            |  100GbE uplinks
+------v--+  +--v------+  +--v------+  +--v--------------------+
| Leaf-1  |  | Leaf-2  |  | Leaf-3  |  | Leaf-4 (storage)     |
| H100 x2 |  | H100 x2 |  | API/LB  |  | NVMe + Vector DB     |
| 25GbE   |  | 25GbE   |  | Monitor |  | 100GbE               |
+---------+  +---------+  +---------+  +----------------------+</div>
  <div class="alert alert-c"><span class="alert-icon">i</span><div><strong>Why spine-leaf?</strong> Every leaf switch has equal-cost paths to every other leaf via both spines. Any-to-any traffic traverses exactly 2 hops. Adding a new GPU node = add a leaf switch + uplink to both spines. Zero reconfiguration of existing nodes.</div></div>
</section>

<section id="loadbalance">
  <h2>Load Balancing Strategy</h2>
  <h3>Session-Aware Routing (not standard round-robin)</h3>
  <p>Standard HTTP load balancing is incorrect for WebSocket-based full-duplex audio. Each session is a <strong>persistent bidirectional stream</strong> that must maintain affinity to a single GPU partition for the session duration.</p>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Layer</th><th>Tool</th><th>Strategy</th><th>Notes</th></tr></thead>
    <tbody>
      <tr><td>L4 (TCP)</td><td>HAProxy</td><td>Least-connection with session stickiness</td><td>WebSocket-aware; 30-min session timeout</td></tr>
      <tr><td>L7 (WS)</td><td>nginx + upstream</td><td>IP hash for initial routing; cookie-based affinity</td><td>Sticky sessions critical for KV cache locality</td></tr>
      <tr><td>GPU-level</td><td>vLLM session router</td><td>Route to GPU with lowest active session count + VRAM headroom</td><td>VRAM-aware scheduler</td></tr>
      <tr><td>Health checking</td><td>Prometheus + custom exporter</td><td>Per-GPU VRAM %, p99 latency, active sessions</td><td>Remove GPU from pool if VRAM &gt;90% or p99 &gt;200ms</td></tr>
    </tbody>
  </table></div>
</section>

<section id="cooling">
  <h2>Cooling Design -- Liquid + Hot Aisle Containment</h2>
  <p>H100 SXM5 GPUs at 700W TDP each cannot be cooled with standard air cooling in a dense rack. The Scale 10-25 design uses <strong>direct liquid cooling (DLC)</strong> via Cooling Distribution Units (CDUs) with rear-door heat exchangers as supplemental air cooling.</p>
  <h3>Liquid Cooling Architecture</h3>
  <ul class="spec-list">
    <li><strong>Primary: Direct-to-chip (DLC):</strong><span>Manifolds attach directly to H100 cold plates. 30-40C inlet water, 50-55C return. Removes ~85% of GPU heat.</span></li>
    <li><strong>Secondary: Rear-door heat exchangers (RDHx):</strong><span>Capture residual heat from air moving through the rack. No standalone CRAC required for GPU racks with RDHx.</span></li>
    <li><strong>Facility cooling plant:</strong><span>2x CRAC units (N+1 redundancy), each 30 kW capacity. Chilled water loop from rooftop chiller. Columbus climate allows economizer cooling 60% of the year.</span></li>
    <li><strong>Hot aisle containment:</strong><span>Polycarbonate containment caps seal hot exhaust aisle. Prevents hot/cold air mixing. Improves cooling efficiency 20-30%.</span></li>
    <li><strong>PUE target:</strong><span>1.30 -- significantly better than US datacenter average of 1.58. Achieved via liquid cooling + economizer mode + hot aisle containment.</span></li>
  </ul>
  <div class="tbl-wrap"><table>
    <thead><tr><th>Component</th><th>Heat Load</th><th>Cooling Method</th></tr></thead>

<section id="nonlinear">
  <h2>Why GPU Scaling Is Not Linear for Conversational AI</h2>
  <p>A common assumption: "2x GPUs = 2x concurrent users." This is false for full-duplex conversational AI workloads. Scaling is sub-linear due to several interacting factors:</p>
  <details open>
    <summary>1. Memory Bandwidth Contention (most impactful)</summary>
    <div class="details-body"><p>Each concurrent session reads from the same KV cache pool on every decode step. As sessions increase, GPU memory bus becomes shared among more readers. <strong>Going from 1 to 5 sessions adds ~5x memory traffic, but bandwidth is fixed.</strong> A single H100 handles ~9 sessions before p99 latency exceeds 150ms.</p></div>
  </details>
  <details>
    <summary>2. NVLink Cross-GPU Overhead</summary>
    <div class="details-body"><p>When tensor parallelism shards the model across GPUs, each decode step requires AllReduce communication across all participating GPUs via NVLink. At 2 GPUs this adds ~1-2ms per step. At 8 GPUs this grows to ~6-8ms per step.</p></div>
  </details>
  <details>
    <summary>3. Continuous Batching Efficiency Curve</summary>
    <div class="details-body"><p>GPU utilization improves with batch size up to a saturation point (~60-70% utilization). Adding sessions beyond this point yields diminishing returns. At 25 sessions on 4 H100s, GPU compute utilization is ~55-65%, but memory bandwidth is at ~85-90% -- making memory the binding constraint.</p></div>
  </details>
