<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yogabrata · ManjuLAB</title>
  <meta name="description" content="Yogabrata — Rhytoma Academy and AI-Caregiver by ManjuLAB." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/theme.css" />
  <link rel="stylesheet" href="assets/landing.css" />

<body class="landing-page">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <div class="mesh" aria-hidden="true"></div>
  <div class="orb orb-cyan" aria-hidden="true"></div>
  <div class="orb orb-orange" aria-hidden="true"></div>

  <header class="landing-header">
    <a class="manjulab-mark" href="https://manjulab.com" target="_blank" rel="noopener">
      <img src="https://brahmando.com/branding/manjulab-logo.png" alt="ManjuLAB" width="44" height="44" />
      <div class="brand-text">
        <strong>ManjuLAB</strong>
        <span>Democratizing Intelligence</span>
      </div>
    </a>
  </header>

  <main class="landing-main">
    <div class="landing-tagline">
      <p>Intelligence for every gap</p>
      <h1>Choose your path</h1>
    </div>

    <div class="portal-grid">
      <a class="portal portal--rhytoma" href="/rhytoma/">
        <div class="portal-ring"></div>
        <div class="portal-orbit"></div>
        <div class="portal-core">
          <span class="portal-icon" aria-hidden="true">📚</span>
          <span class="portal-title bn">ঋতমা Academy</span>
          <span class="portal-sub">West Bengal Board · TruthGuard</span>
        </div>

      <a class="portal portal--caregiver" href="/ai-caregiver/">
        <div class="portal-ring"></div>
        <div class="portal-orbit"></div>
        <div class="portal-core">
          <span class="portal-icon" aria-hidden="true">🎙️</span>
          <span class="portal-title">AI-Caregiver</span>
          <span class="portal-sub">Full-duplex voice AI</span>
        </div>
      </a>
    </div>
  </main>

  <footer class="landing-footer">
    <img src="https://brahmando.com/branding/brahmexa-logo.jpeg" alt="" />
    <img src="https://brahmando.com/branding/brahmando-logo.jpg" alt="" />
    <p style="margin-top:8px">
      A <a href="https://brahmando.com">Brahmexa</a> group surface ·
      <a href="https://brahmando.com">brahmando.com</a>
    </p>
  </footer>

  <script src="assets/cosmic.js"></script>
