<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice · GRE / GMAT</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="../sat-act/sat-act-mock.css" />
</head>
<body class="portal-page study-room-page">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <header class="portal-header">
    <a class="back-link" href="exam-center.html">← Exam Center</a>
    <h1>Practice Test</h1>
  </header>
  <main class="portal-main" style="max-width:820px">
    <p class="portal-note">Section mocks follow official GRE &amp; GMAT Focus timing. Question bank ingestion is in progress — <strong>Learn mode</strong> is fully populated with 17 skill chapters.</p>
    <section class="practice-card">
      <h2>Skill drill (Study Room)</h2>
      <label>Exam</label>
      <select id="prTrack"><option value="gre">GRE</option><option value="gmat">GMAT Focus</option></select>
      <label>Section</label>
      <select id="prSection"></select>
      <button type="button" class="btn-portal btn-portal-primary" id="btnSkillStart" style="width:100%;margin-top:12px">Open Study Room</button>
    </section>
  </main>
  <script>
    const sections = {
      gre: [['gre-verbal','Verbal Reasoning'],['gre-quantitative','Quantitative Reasoning'],['gre-awa','Analytical Writing']],
      gmat: [['gmat-quantitative','Quantitative'],['gmat-verbal','Verbal'],['gmat-data-insights','Data Insights']],
    };
    const trackEl = document.getElementById('prTrack');
    const secEl = document.getElementById('prSection');
    function syncSections() {
      secEl.innerHTML = sections[trackEl.value].map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
    }
    trackEl.addEventListener('change', syncSections);
    syncSections();
    document.getElementById('btnSkillStart').addEventListener('click', () => {
      location.href = `room.html?track=${trackEl.value}&section=${secEl.value}&intent=evaluate`;
    });
  </script>
</body>
</html>
