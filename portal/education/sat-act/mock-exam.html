<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Section Mock · SAT / ACT</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="sat-act-mock.css" />
</head>
<body class="portal-page mock-exam-page sat-act-mock-page" data-track="act">
  <header class="mock-exam-header">
    <a class="back-link" href="exam-center.html">← Exam Center</a>
    <div class="mock-clock-wrap">
      <div class="mock-clock" id="mockClock">45:00</div>
      <div class="mock-clock-label" id="clockLabel">Section time remaining</div>
    </div>
    <div class="mock-integrity" id="integrityPanel">
      <span>Focus: <strong id="focusScore">100</strong>%</span>
      <span>Paste: <strong id="pasteCount">0</strong></span>
      <span>Tab away: <strong id="blurCount">0</strong></span>
    </div>
  </header>
  <main class="portal-main mock-exam-main">
    <div id="paperShell"></div>
    <div id="mockQuestions"></div>
    <button type="button" class="btn-portal btn-portal-primary" id="btnSubmitMock" style="margin:24px auto;display:block">
      Submit section
    </button>
    <div id="mockReport" hidden></div>
  </main>
  <script src="../../assets/academy-config.js"></script>
  <script src="../../assets/sat-act-shared.js"></script>
  <script src="mock-exam.js"></script>
</body>
</html>
