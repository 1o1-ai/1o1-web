<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rhytoma Academy · Study Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="../cbse10/cbse10-study-room.css" />
  <link rel="stylesheet" href="../sat-act/sat-act-study-room.css" />
</head>
<body class="portal-page study-room-page student-ambience" data-sku="rhytoma-wbbse">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <div class="mesh" aria-hidden="true"></div>

  <header class="portal-header">
    <a class="back-link" href="index.html">← Rhytoma Hub</a>
    <h1>Study Room</h1>
    <span id="ingestBadge" class="sr-open-badge" hidden></span>
  </header>

  <main class="portal-main sr-main">
    <section id="phaseGrade" class="sr-phase sr-phase-subject">
      <div id="srLoadError" class="sr-load-error hidden" role="alert"></div>
      <p class="sr-phase-lead">Choose your class</p>
      <div class="sr-subject-circles" id="gradeCircles"></div>
    </section>

    <section id="phaseSubject" class="sr-phase hidden">
      <p class="sr-phase-lead" id="subjectLead">Choose subject</p>
      <div class="sr-subject-circles">
        <button type="button" class="sr-subject-circle science" data-subject="science">
          <span class="sr-circle-icon">🧪</span>
          <span class="sr-circle-title">Science</span>
          <span class="sr-circle-code" id="scienceBoard">WBBSE</span>
        </button>
        <button type="button" class="sr-subject-circle math" data-subject="mathematics">
          <span class="sr-circle-icon">📐</span>
          <span class="sr-circle-title">Mathematics</span>
          <span class="sr-circle-code" id="mathBoard">WBBSE</span>
        </button>
      </div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backToGrade">← Change class</button>
    </section>

    <section id="phaseChapter" class="sr-phase hidden">
      <p class="sr-phase-lead">Select <strong>one</strong> chapter</p>
      <div class="sr-chapter-grid" id="chapterGrid"></div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backToSubject">← Change subject</button>
    </section>

    <section id="phaseIntent" class="sr-phase hidden">
      <p class="sr-phase-lead" id="intentChapterLabel">Chapter</p>
      <div class="sr-intent-circles">
        <button type="button" class="sr-intent-card" id="btnLearn">
          <span class="sr-intent-icon">📚</span>
          <strong>Learn</strong>
          <small>Chapter overview &amp; syllabus notes</small>
        </button>
        <button type="button" class="sr-intent-card primary" id="btnEvaluate">
          <span class="sr-intent-icon">✅</span>
          <strong>Evaluate</strong>
          <small>Verified board MCQs when available</small>
        </button>
      </div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backToChapter">← Change chapter</button>
    </section>

    <section id="phaseLearn" class="sr-phase hidden">
      <div class="sr-learn-layout">
        <div class="sr-learn-main">
          <div class="sr-eval-header">
            <h2 id="learnTitle">Chapter</h2>
            <p id="learnSubtitle" class="sr-chapter-meta"></p>
          </div>
          <div id="learnContent" class="sr-learn-content"></div>
          <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backFromLearn">← Back</button>
        </div>
        <aside class="sr-students-panel">
          <h3>Students online</h3>
          <ul id="learnStudentsRoster" class="sr-students-list"></ul>
        </aside>
      </div>
    </section>

    <section id="phaseEvaluate" class="sr-phase hidden">
      <div class="sr-eval-layout">
        <div class="sr-eval-main">
          <div class="sr-eval-header">
            <h2 id="evalTitle">Chapter</h2>
            <p id="evalSubtitle" class="sr-chapter-meta"></p>
          </div>
          <div class="sr-eval-chat" id="evalChat">
            <p class="sr-eval-hint">Practice items will appear here when the question bank is populated.</p>
          </div>
          <div class="sr-eval-actions">
            <button type="button" class="btn-portal btn-portal-primary" id="btnStartQuiz">Start 5-question drill</button>
          </div>
          <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backFromEvaluate">← Back</button>
        </div>
        <aside class="sr-students-panel">
          <h3>Students online</h3>
          <ul id="studentsRoster" class="sr-students-list"></ul>
        </aside>
      </div>
    </section>
  </main>

  <script src="../../../assets/cosmic.js"></script>
  <script src="../../assets/academy-config.js"></script>
  <script src="../../assets/presence.js"></script>
  <script src="../../assets/bots.js"></script>
  <script src="../../assets/question-format.js"></script>
  <script src="rhytoma-grade-room.js"></script>
</body>
</html>
