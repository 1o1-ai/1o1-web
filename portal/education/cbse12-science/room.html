<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>CBSE XII Science · Study Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="../cbse10/cbse10-study-room.css" />
  <link rel="stylesheet" href="cbse12-study-room.css" />
  <link rel="stylesheet" href="../../assets/cbse-official-books.css" />
</head>
<body class="portal-page study-room-page student-ambience">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <div class="mesh" aria-hidden="true"></div>
  <div class="lamp-glow" aria-hidden="true"></div>

  <header class="portal-header" id="mainHeader">
    <a class="back-link" href="index.html">← Hub</a>
    <h1>Study Room</h1>
    <span id="statsBadge" class="sr-open-badge" hidden></span>
  </header>

  <main class="portal-main sr-main">
    <section id="phaseSubject" class="sr-phase sr-phase-subject">
      <div id="srLoadError" class="sr-load-error hidden" role="alert"></div>
      <p class="sr-phase-lead">Choose your subject</p>
      <div class="sr-subject-circles" id="subjectCircles"></div>
    </section>

    <section id="phaseChapter" class="sr-phase hidden">
      <p class="sr-phase-lead" id="chapterLead">Select one chapter</p>
      <div class="sr-chapter-grid" id="chapterGrid"></div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backToSubject">← Change subject</button>
    </section>

    <section id="phaseStudy" class="sr-phase hidden">
      <div class="cbse-study-header">
        <h2 id="studyHubTitle">Chapter</h2>
        <p id="studyHubSubtitle" class="sr-chapter-meta"></p>
      </div>
      <div id="studyTabBar"></div>
      <div id="studyTabPanel"></div>
      <div id="studyPracticeEmbed" class="cbse-practice-embed hidden"></div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backFromStudy">← Change chapter</button>
    </section>

    <section id="phaseIntent" class="sr-phase hidden" hidden aria-hidden="true">
      <p class="sr-phase-lead" id="intentChapterLabel">Chapter</p>
      <div class="sr-intent-circles">
        <button type="button" class="sr-intent-card" id="btnLearn">
          <span class="sr-intent-icon">📚</span>
          <strong>Learn</strong>
          <small>Chapter overview &amp; study notes</small>
        </button>
        <button type="button" class="sr-intent-card primary" id="btnEvaluate">
          <span class="sr-intent-icon">✅</span>
          <strong>Evaluate</strong>
          <small>Chapter question drills</small>
        </button>
      </div>
      <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backToChapter">← Change chapter</button>
    </section>

    <section id="phaseLearn" class="sr-phase hidden">
      <div class="sr-learn-layout">
        <div class="sr-learn-main">
          <div class="sr-eval-header">
            <h2 id="learnTitle">Chapter</h2>
            <p id="learnSubtitle" class="sr-chapter-meta"></p>
          </div>
          <div id="learnContent" class="sr-learn-content"></div>
          <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backFromLearn">← Back</button>
        </div>
        <aside class="sr-students-panel">
          <h3>Students online</h3>
          <p class="sr-students-hint">Classmates studying now</p>
          <ul id="learnStudentsRoster" class="sr-students-list"></ul>
        </aside>
      </div>
    </section>

    <section id="phaseEvaluate" class="sr-phase hidden">
      <div class="sr-eval-layout">
        <div class="sr-eval-main">
          <div class="sr-eval-header">
            <h2 id="evalTitle">Chapter</h2>
            <p id="evalSubtitle" class="sr-chapter-meta"></p>
          </div>
          <div id="evalChat" class="sr-eval-chat"></div>
          <button type="button" class="btn-portal btn-portal-ghost sr-back-btn" id="backFromEvaluate">← Back</button>
        </div>
        <aside class="sr-students-panel">
          <h3>Students online</h3>
          <p class="sr-students-hint">Peers in the room</p>
          <ul id="studentsRoster" class="sr-students-list"></ul>
        </aside>
      </div>
    </section>
  </main>

  <script src="../../../assets/cosmic.js"></script>
  <script src="../../assets/academy-config.js"></script>
  <script src="../../assets/bots.js"></script>
  <script src="../../assets/cbse-voice-engine.js"></script>
  <script src="../../assets/cbse-hangman-quiz.js?v=3"></script>
  <script src="../../assets/cbse-official-books.js?v=2"></script>
  <script src="../../assets/cbse-study-hub.js"></script>
  <script src="cbse12-room.js"></script>
</body>
</html>
