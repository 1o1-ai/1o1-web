<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice · TOEFL · IELTS · DET</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="../sat-act/sat-act-mock.css" />
</head>
<body class="portal-page study-room-page">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <header class="portal-header">
    <a class="back-link" href="exam-center.html">← Exam Center</a>
    <h1>Practice Test</h1>
  </header>
  <main class="portal-main" style="max-width:820px">
    <p class="portal-note">Section mocks use official timing from ETS, Cambridge &amp; Duolingo guides. Question bank ingestion is in progress — <strong>Learn mode</strong> is fully populated.</p>
    <section class="practice-card">
      <h2>Skill drill (Study Room)</h2>
      <p class="hint">Open Evaluate in the Study Room for chapter-level practice.</p>
      <label>Exam</label>
      <select id="prTrack"><option value="toefl">TOEFL iBT</option><option value="ielts">IELTS Academic</option><option value="det">Duolingo English Test</option></select>
      <label>Section</label>
      <select id="prSection">
        <option value="toefl-reading">Reading</option>
        <option value="toefl-listening">Listening</option>
        <option value="toefl-speaking">Speaking</option>
        <option value="toefl-writing">Writing</option>
      </select>
      <button type="button" class="btn-portal btn-portal-primary" id="btnSkillStart" style="width:100%;margin-top:12px">Open Study Room</button>
    </section>
  </main>
  <script src="../../../assets/cosmic.js"></script>
  <script src="../../assets/academy-config.js"></script>
  <script>
    const sections = {
      toefl: [['toefl-reading','Reading'],['toefl-listening','Listening'],['toefl-speaking','Speaking'],['toefl-writing','Writing']],
      ielts: [['ielts-reading','Reading'],['ielts-listening','Listening'],['ielts-speaking','Speaking'],['ielts-writing','Writing']],
      det: [['det-literacy','Literacy'],['det-comprehension','Comprehension'],['det-conversation','Conversation'],['det-production','Production']],
    };
    const trackEl = document.getElementById('prTrack');
    const secEl = document.getElementById('prSection');
    function syncSections() {
      const t = trackEl.value;
      secEl.innerHTML = sections[t].map(([v,l]) => `<option value="${v}">${l}</option>`).join('');
    }
    trackEl.addEventListener('change', syncSections);
    syncSections();
    document.getElementById('btnSkillStart').addEventListener('click', () => {
      location.href = `room.html?track=${trackEl.value}&section=${secEl.value}&intent=evaluate`;
    });
  </script>
</body>
</html>
