<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Board Mock · CBSE</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
  <link rel="stylesheet" href="../../assets/exam-center.css" />
</head>
<body class="portal-page mock-exam-page exam-paper-page" data-sku="cbse10">
  <header class="mock-exam-header">
    <a class="back-link" href="exam-center.html">← Exam Center</a>
    <div class="mock-clock-wrap">
      <div class="mock-clock" id="mockClock">03:00:00</div>
      <div class="mock-clock-label">Time remaining · 3 hour board session</div>
    </div>
    <div class="mock-integrity" id="integrityPanel">
      <span>Focus: <strong id="focusScore">100</strong>%</span>
      <span>Paste: <strong id="pasteCount">0</strong></span>
      <span>Tab away: <strong id="blurCount">0</strong></span>
    </div>
  </header>
  <main class="portal-main mock-exam-main">
    <div class="exam-paper-sheet">
      <header class="exam-board-header" id="boardHeader"></header>
      <div class="exam-marks-box" id="marksBox"></div>
      <div class="exam-general-instructions" id="instructions"></div>
      <div id="mockSections"></div>
    </div>
    <button type="button" class="btn-portal btn-portal-primary" id="btnSubmitMock" style="margin:24px auto;display:block">Submit paper</button>
    <div id="mockReport" hidden></div>
  </main>
  <script src="../../assets/question-format.js?v=5"></script>
  <script src="../../assets/diagram-vector.js"></script>
  <script src="../../assets/exam-schema.js"></script>
  <script src="../../assets/cbse10-shared.js?v=5"></script>
  <script src="../../assets/answer-composer.js?v=5"></script>
  <script src="../../assets/portal-auth.js"></script>
  <script src="mock-exam.js?v=5"></script>
</body>
</html>
