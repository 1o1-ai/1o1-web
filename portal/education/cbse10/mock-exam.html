<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Board Mock · CBSE 10</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
</head>
<body class="portal-page mock-exam-page">
  <header class="mock-exam-header">
    <a class="back-link" href="room.html">← Study room</a>
    <div class="mock-clock-wrap">
      <div class="mock-clock" id="mockClock">03:00:00</div>
      <div class="mock-clock-label">Time remaining · 3 hr board session</div>
    </div>
    <div class="mock-integrity" id="integrityPanel">
      <span>Focus: <strong id="focusScore">100</strong>%</span>
      <span>Paste: <strong id="pasteCount">0</strong></span>
      <span>Tab away: <strong id="blurCount">0</strong></span>
    </div>
  </header>
  <main class="portal-main mock-exam-main">
    <div class="mock-paper-header">
      <h1 id="paperTitle">CBSE Class X · Mathematics Standard</h1>
      <p id="paperMeta">Section A — Multiple Choice Questions · Verified from ingested board papers</p>
    </div>
    <div id="mockQuestions"></div>
    <button type="button" class="btn-portal btn-portal-primary" id="btnSubmitMock" style="margin:24px auto;display:block">Submit paper</button>
    <div id="mockReport" hidden></div>
  </main>
  <script src="../../assets/diagram-vector.js"></script>
  <script src="../../assets/cbse10-shared.js"></script>
  <script src="mock-exam.js"></script>
</body>
</html>
