<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Practice Test · CBSE 10</title>
  <link rel="stylesheet" href="../../../assets/theme.css" />
  <link rel="stylesheet" href="../../assets/portal.css" />
</head>
<body class="portal-page study-room-page">
  <canvas id="cosmos" aria-hidden="true"></canvas>
  <header class="portal-header">
    <a class="back-link" href="exam-center.html">← Exam Center</a>
    <h1>Practice Test</h1>
  </header>
  <main class="portal-main" style="max-width:720px">
    <section class="practice-card">
      <h2>Chapter practice</h2>
      <p class="hint">Verified board MCQs from catalog + bank — 1–15 questions per drill.</p>
      <label>Subject</label>
      <select id="prSubject"><option value="science">Science</option><option value="mathematics">Mathematics</option></select>
      <label>Chapter</label>
      <select id="prChapter"></select>
      <label>Number of questions (max 15)</label>
      <input id="prCount" type="number" min="1" max="15" value="5" />
      <label><input type="checkbox" id="prFigureOnly" /> Prefer questions that mention a figure/graph (best in Math: Circles, Polynomials)</label>
      <button type="button" class="btn-portal btn-portal-primary" id="btnChapterStart" style="width:100%;margin-top:12px">Start chapter practice</button>
      <p class="portal-note" style="margin-top:12px;font-size:0.8rem">
        Full 3-hour board mock? Use <a href="exam-center.html">Exam Center → Mock Test</a>.
      </p>
    </section>

    <div id="quizArea" hidden></div>
  </main>
  <script src="../../../assets/cosmic.js"></script>
  <script src="../../assets/question-format.js"></script>
  <script src="../../assets/cbse10-shared.js"></script>
  <script src="../../assets/portal.js"></script>
  <script src="practice.js"></script>
</body>
</html>
